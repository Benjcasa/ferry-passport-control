<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle Passagers Ferry</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">
</head>

<body>

    <h1>Contrôle Passagers Ferry</h1>

    <input type="file" id="excelFile" accept=".xlsx,.xls">

    <div id="resultat">
        Aucun fichier chargé
    </div>

    <h2>Statistiques</h2>

    <div id="stats">
        Total : 0<br>
        Contrôlés : 0<br>
        Restants : 0
    </div>

    <hr>

    <h2>Recherche passager</h2>

    <input
        id="recherche"
        placeholder="Tapez le nom, prénom ou date de naissance">

    <div id="resultatRecherche"></div>

    <script src="xlsx.full.min.js"></script>
    <script src="app.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./service-worker.js")
                .then(() => console.log("Service Worker activé"))
                .catch(err => console.log(err));
        }
    </script>

</body>

</html>

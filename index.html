<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Contrôle Passagers Ferry</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">
</head>

<body>

    <h1>Contrôle Passagers Ferry</h1>

    <input type="file" id="excelFile" accept=".xlsx,.xls">

    <div id="resultat">
        Aucun fichier chargé
    </div>

    <h2>Statistiques</h2>

    <div id="stats">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Contrôlés</div>
                <div class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Restants</div>
                <div class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🚬 Cartouches</div>
                <div class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🍾 Bouteilles</div>
                <div class="stat-value">0</div>
            </div>
        </div>
    </div>

    <button id="exportBtn" onclick="exporterControles()">
        Exporter les contrôles
    </button>

    <hr>

    <h2>Recherche passager</h2>

    <input
        id="recherche"
        placeholder="Tapez le nom, prénom ou date de naissance">

    <div id="resultatRecherche"></div>

<script src="xlsx.full.min.js"></script>
<script src="export.js"></script>
<script src="app.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("./service-worker.js")
                .then(() => console.log("Service Worker activé"))
                .catch(err => console.log(err));
        }
    </script>

</body>

</html>
